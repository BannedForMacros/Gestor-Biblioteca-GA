{% extends "base.html" %}
{% block title %}{{ titulo }} · Gestor Biblioteca{% endblock %}
{% block content %}
<section class="max-w-3xl mx-auto px-6 py-12">
  <div class="anim-entrada bg-white rounded-2xl shadow-md border-2 border-red-300 overflow-hidden">
    <header class="bg-red-50 px-6 py-5 border-b-2 border-red-200 flex items-center gap-4">
      <div class="flex-shrink-0 w-12 h-12 rounded-full bg-red-600 text-white flex items-center justify-center text-2xl font-bold">!</div>
      <h1 class="text-2xl font-extrabold text-red-900">{{ titulo }}</h1>
    </header>
    <div class="p-6">
      <p class="text-slate-700 leading-relaxed">{{ mensaje }}</p>
    </div>
  </div>
  <div class="anim-entrada-1 mt-6 flex justify-center gap-3">
    <a href="{% url 'home' %}" class="inline-flex items-center px-6 py-3 rounded-lg border-2 border-slate-300 text-slate-700 font-semibold hover:bg-slate-100 transition-colors">← Volver al inicio</a>
    <a href="{% url 'prestamos:nuevo' %}" class="inline-flex items-center px-6 py-3 rounded-lg bg-marca-600 text-white font-bold hover:bg-marca-700 transition-colors shadow">Intentar otro préstamo →</a>
  </div>
</section>
{% endblock %}
