{% comment %}
Filtro de rango de fechas reutilizable.
Variables: desde, hasta (datetime.date), export_qs (querystring para export, opcional).
{% endcomment %}
<form method="get" class="anim-entrada-1 bg-white rounded-2xl border border-slate-200 p-4 mb-5 flex flex-col md:flex-row md:items-end gap-3">
  <div class="flex-1 grid grid-cols-2 gap-3">
    <div>
      <label for="desde" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Desde</label>
      <input type="date" id="desde" name="desde" value="{{ desde|date:'Y-m-d' }}"
             class="w-full px-3 py-2 rounded-xl border-2 border-slate-200 bg-white text-sm shadow-sm focus:border-marca-500 focus:ring-0 focus:shadow-md transition-all">
    </div>
    <div>
      <label for="hasta" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Hasta</label>
      <input type="date" id="hasta" name="hasta" value="{{ hasta|date:'Y-m-d' }}"
             class="w-full px-3 py-2 rounded-xl border-2 border-slate-200 bg-white text-sm shadow-sm focus:border-marca-500 focus:ring-0 focus:shadow-md transition-all">
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button type="submit" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/></svg>
      Aplicar
    </button>
    <a href="?desde={{ desde|date:'Y-m-d' }}&hasta={{ hasta|date:'Y-m-d' }}&export=csv"
       class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-700 text-sm font-semibold hover:border-acento-300 hover:text-acento-700 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
      Exportar CSV
    </a>
  </div>
</form>
